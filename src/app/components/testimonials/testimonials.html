<section id="testimonios" class="testimonials-section">
  <div class="container">
    <h2 class="section-title">Lo que dicen nuestros clientes</h2>
    <p class="section-subtitle">Experiencias reales de personas que pasaron por Hilo & Taza.</p>

    <div class="testimonials-dual-grid">
      <div class="testimonial-card-original" *ngFor="let test of testimonios.slice(0, 2)">
        
        <div class="quote-mark">“</div>
        
        <p class="testimonial-text">"{{ test.comentario }}"</p>

        <div class="audio-container">
          <audio [src]="test.audio" controls class="audio-player-element"></audio>
        </div>

        <div class="author-info">
          <h4>{{ test.nombre }}</h4>
          <span>{{ test.rol }}</span>
        </div>

      </div>
    </div>
  </div>
</section>
