<section id="galeria" class="gallery-section">
  <div class="container-fluid">
    <h2 class="section-title">Nuestro Espacio</h2>
    <p class="section-subtitle">Un vistazo a los momentos, el arte y el café de cada día.</p>

    <div class="infinite-carousel-track">
      <div class="carousel-strip">
        
        <div class="gallery-item" *ngFor="let item of fotos">
          <img [src]="item.imagen" alt="{{ item.alt }}" />
          <div class="gallery-overlay-hint">
            <span>Hilo & Taza</span>
          </div>
        </div>

        <div class="gallery-item" *ngFor="let item of fotos">
          <img [src]="item.imagen" alt="{{ item.alt }}" />
          <div class="gallery-overlay-hint">
            <span>Hilo & Taza</span>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
